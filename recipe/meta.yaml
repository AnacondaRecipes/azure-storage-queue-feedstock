{% set name = "azure-storage-queue" %}
{% set version = "12.15.0b1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: a33987ce45972c3c87dfa3a9769c991550b3512d68ab1b15dcd042bb95543982

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<39]

requirements:
  build:
    - python
    - setuptools
    - wheel
    - pip
  run:
    - python
    - azure-core >=1.30.0
    - cryptography >=2.1.4
    - typing-extensions >=4.6.0
    - isodate >=0.6.1
  run_constrained:
    # azure-core[aio]>=1.30.0 -> https://github.com/Azure/azure-sdk-for-python/blob/main/sdk/core/azure-core/pyproject.toml#L32
    - aiohttp >=3.0

test:
  imports:
    - azure.storage.queue
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/Azure/azure-storage-python
  summary: Microsoft Azure Storage Queue Client Library for Python
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  description: Microsoft Azure Storage Queue Client Library for Python
  dev_url: https://github.com/Azure/azure-storage-python
  doc_url: https://github.com/Azure/azure-storage-python
  

extra:
  recipe-maintainers:
    - xhochy
